# ===========================
# Datasource (H2 in-memory)
# ===========================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Disable Spring Security basic auth (security is a noted future improvement)
spring.security.basic.enabled=false

# ===========================
# Energy API (FinestMedia)
# FIX: URL was hardcoded in Constant.java and also incorrectly redefined here as a
# plain string (URL="..."). Spring does not bind bare quoted strings this way.
# Moved to properly named properties that are @Value-injected in DataLoaderServiceImpl.
# ===========================
energy.api.url.start=https://finestmedia.ee/kwh/?start=
energy.api.url.end.part=&end=

# ===========================
# Logging
# FIX: log4j.properties references a hardcoded Windows path (D:\\log4j-application.log).
# Use a relative path or an environment variable so the app runs on any OS.
# ===========================
#logging.file.name=logs/energy-consumption.log
logging.level.root=INFO
logging.level.service=DEBUG
